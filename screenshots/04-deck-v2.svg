<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#090c16"/>
  <rect x="40" y="34" width="1360" height="832" rx="32" fill="#0F1427" stroke="#29324D"/>
  <text x="94" y="108" fill="#8FDBFF" font-family="Arial, sans-serif" font-size="22" letter-spacing="6">PRESENTATION SURFACE</text>
  <text x="94" y="168" fill="#F4EAD7" font-family="Georgia, serif" font-size="46" font-weight="700">
    <tspan x="94" dy="0">An interface that feels</tspan>
    <tspan x="94" dy="52">closer to a strategy room</tspan>
    <tspan x="94" dy="52">than a SaaS panel.</tspan>
  </text>

  <rect x="94" y="314" width="382" height="420" rx="26" fill="#171E38" stroke="#29324D"/>
  <rect x="528" y="314" width="382" height="420" rx="26" fill="#171E38" stroke="#29324D"/>
  <rect x="962" y="314" width="342" height="420" rx="26" fill="#171E38" stroke="#29324D"/>

  <text x="126" y="370" fill="#88D8FF" font-family="Arial, sans-serif" font-size="18" letter-spacing="4">OPENING FRAME</text>
  <text x="560" y="370" fill="#88D8FF" font-family="Arial, sans-serif" font-size="18" letter-spacing="4">NARRATIVE SPINE</text>
  <text x="994" y="370" fill="#88D8FF" font-family="Arial, sans-serif" font-size="18" letter-spacing="4">PRESENTATION MODE</text>

  <text x="126" y="450" fill="#F4EAD7" font-family="Georgia, serif" font-size="30" font-weight="700">
    <tspan x="126" dy="0">Start with the decision,</tspan>
    <tspan x="126" dy="34">not the dashboard.</tspan>
  </text>
  <text x="560" y="450" fill="#F4EAD7" font-family="Georgia, serif" font-size="30" font-weight="700">
    <tspan x="560" dy="0">Each section should answer</tspan>
    <tspan x="560" dy="34">what changed and why.</tspan>
  </text>
  <text x="994" y="450" fill="#F4EAD7" font-family="Georgia, serif" font-size="30" font-weight="700">
    <tspan x="994" dy="0">Typography and rhythm</tspan>
    <tspan x="994" dy="34">should carry persuasion.</tspan>
  </text>
</svg>
