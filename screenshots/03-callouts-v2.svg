  <rect x="952" y="282" width="352" height="420" rx="26" fill="#301B2A" stroke="#29324D"/>

  <text x="126" y="338" fill="#88D8FF" font-family="Arial, sans-serif" font-size="18" letter-spacing="4">WHAT CHANGED</text>
  <text x="606" y="338" fill="#88D8FF" font-family="Arial, sans-serif" font-size="18" letter-spacing="4">WHY IT MATTERS</text>
  <text x="984" y="338" fill="#88D8FF" font-family="Arial, sans-serif" font-size="18" letter-spacing="4">WHAT TO DO NEXT</text>

